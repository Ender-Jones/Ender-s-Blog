subtitle: 一条线, 三篇论文
protocol: UBFC-PHYS · TSST-INSPIRED

papers:
  - status: 已发表
    tone: pink
    title: EDA-augmented CCT-LSTM for stress-task classification
    dek: "这条线的第一座公开车站 — 接触信号加入视频."
    venue: KICS · 短文
    anchor: kics-2025
    abstract: >-
      在 UBFC-Phys 上复现 CCT-LSTM 的压力任务分类, 并在受试者级协议下引入腕戴
      EDA 做增强. 定位就是 preliminary — 期刊版会扩展并重新评估它.
    contribution: 设计融合方案与受试者级评估协议; 全部实验由我完成.
    links: {}
  - status: 已并入
    tone: blue
    title: A reliability audit of remote-PPG under social stress
    dek: "接触信号为什么留下: 越是压力发生的时刻, rPPG 越靠不住."
    venue: 审计 → 期刊 §motivation
    anchor: ispacs-2026
    abstract: >-
      审计远程光电容积描记(rPPG)在受试者真正紧张时的表现 — 运动、表情与自主神经
      负荷, 恰恰在最要紧的时刻劣化信号. 这份审计比它的会场活得久: 如今它成了
      期刊版的动机一节.
    contribution: 搭建审计流水线与运动伪影分析.
    links: {}
  - status: 撰写中
    tone: amber
    title: The journal version — reproducible, fully open
    dek: 严格协议, 完整消融, 诚实的阴性结果.
    venue: IEEE J-BHI · 目标
    anchor: ieee-j-bhi
    abstract: >-
      这条线的汇总陈述: 忠实复现基线, 在受试者级划分与多随机种子下做防泄漏的
      重新评估, 并诚实诊断这份数据到底支持、不支持多细的压力等级 — 以可复现
      为写作目标, 发布即完全开源.
    contribution: 正在写 — 逐日进展在 worklog 上.
    links: {}

metric:
  label: 评估协议
  value: 7-fold × 5 seeds
  notes:
    - 受试者级划分, 绝不用样本级
    - 配对统计, 带校正
  honesty: >-
    头条数字随期刊见刊落地 — 在那之前, 协议本身就是承诺.

keywords: multimodal video · reproducibility · temporal modeling
keywords_next: "next: VLM / MLLM for affect"
whats_next: >-
