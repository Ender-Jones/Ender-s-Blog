# Research 数据入口 — 主页面板和 /research/ 页都从这里读.
# tone 决定状态点/悬停条的颜色: pink=published · blue=under review(点会呼吸) · amber=in writing.
# links 里没有的键就不渲染(paper/code 都可留空); timeline 想加学历节点照模板取消注释即可.

subtitle: one line, three papers
protocol: UBFC-PHYS · TSST-INSPIRED

papers:
  - status: Published
    tone: pink
    title: EDA-augmented CCT-LSTM for stress-task classification
    dek: "First result: adding EDA lifts macro-F1 under a strict subject-level protocol."
    venue: KICS · short paper
    anchor: kics-2025
    abstract: >-
      Reproduces CCT-LSTM for stress-task classification on UBFC-PHYS and augments it
      with electrodermal activity. Under a strict subject-level split, EDA fusion lifts
      macro-F1 from 0.73 to 0.83 — the first result on this line.
    contribution: Designed the fusion setup and the subject-level evaluation protocol; ran all experiments.
    links: {}
  - status: Under review
    tone: blue
    title: A reliability audit of remote-PPG under social stress
    dek: "Why EDA is necessary: rPPG degrades exactly when stress happens."
    venue: ISPACS 2026 · submitted
    anchor: ispacs-2026
    abstract: >-
      Audits how remote photoplethysmography behaves when the subject is actually
      stressed — motion, expression, and autonomic load degrade the signal precisely
      in the moments that matter. The audit motivates contact-signal augmentation.
    contribution: Built the audit pipeline and the motion-artifact analysis; first author.
    links: {}
  - status: In writing
    tone: amber
    title: The journal version — reproducible, fully open
    dek: Strict protocol, full ablations, honest negative results.
    venue: IEEE J-BHI · target
    anchor: ieee-j-bhi
    abstract: >-
      The consolidated journal account: strict subject-level protocol, full ablation
      grid, paired statistics, and the negative results kept in — written to be
      reproduced, not just cited.
    contribution: In writing now — the day-by-day trail is on the worklog.
    links: {}

metric:
  label: Headline metric
  value: 0.73 → 0.83
  notes:
    - macro-F1 with EDA fusion
    - subject-level 7-fold · 3 seeds
  honesty: >-
    Numbers under a strict protocol: subject-level splits, multiple seeds, paired
    statistics — smaller headline, but it holds.

keywords: multimodal video · cross-modal fusion · temporal modeling
keywords_next: "next: VLM / MLLM for affect"
whats_next: >-
  Vision-language directions for emotion recognition — probing whether VLM/MLLM
  representations can read affect the way contact signals do.

