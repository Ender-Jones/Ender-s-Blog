# Research 数据入口 — 主页面板和 /research/ 页都从这里读.
# tone 决定状态点/悬停条的颜色: pink=published · blue=signal/audit · amber=in writing.
# ⚠ 数字纪律: J-BHI 见刊前不放任何未发表数字; KICS 的旧数字也不复述(对外口径: preliminary).
# links 里没有的键就不渲染; timeline 学历节点照模板取消注释即可.

subtitle: one line, three papers
protocol: UBFC-PHYS · TSST-INSPIRED

papers:
  - status: Published
    tone: pink
    title: EDA-augmented CCT-LSTM for stress-task classification
    dek: "The first public station of this line — contact signals join the video."
    venue: KICS · short paper
    anchor: kics-2025
    abstract: >-
      Reproduces CCT-LSTM for stress-task classification on UBFC-Phys and augments
      it with wrist-worn EDA under a subject-level protocol. Preliminary by design —
      the journal version extends and re-evaluates it.
    contribution: Designed the fusion setup and the subject-level evaluation protocol; ran all experiments.
    links: {}
  - status: Absorbed
    tone: blue
    title: A reliability audit of remote-PPG under social stress
    dek: "Why contact signals stay: rPPG degrades exactly when stress happens."
    venue: audit → journal, §motivation
    anchor: ispacs-2026
    abstract: >-
      Audits how remote photoplethysmography behaves when the subject is actually
      stressed — motion, expression, and autonomic load degrade the signal precisely
      in the moments that matter. The audit outlived its venue: it now motivates
      the journal version.
    contribution: Built the audit pipeline and the motion-artifact analysis.
    links: {}
  - status: In writing
    tone: amber
    title: The journal version — reproducible, fully open
    dek: Strict protocol, full ablations, honest negative results.
    venue: IEEE J-BHI · target
    anchor: ieee-j-bhi
    abstract: >-
      The consolidated account: a faithful reproduction of the baseline, a
      leakage-safe re-evaluation under subject-level splits and multiple seeds,
      and an honest diagnostic of what fine-grained stress levels the data can
      and cannot support — written to be reproduced, fully open on release.
    contribution: In writing now — the day-by-day trail is on the worklog.
    links: {}

metric:
  label: Protocol
  value: 7-fold × 5 seeds
  notes:
    - subject-level splits, never sample-level
    - paired statistics, corrected
  honesty: >-
    The headline number lands with the journal — until then,
    the protocol is the promise.

keywords: multimodal video · reproducibility · temporal modeling
keywords_next: "next: VLM / MLLM for affect"
whats_next: >-
  Vision-language directions for emotion recognition — the second journal's
  question, opened after this one ships: can VLM/MLLM representations read
  affect the way contact signals do?

