# Coda 引文库(主页/文章页底部).
# 手动加一条: 复制任意一段, 改字段即可. trans(译文)和 link_label 可省略.
# id 用于在文章 frontmatter 里固定 coda(coda: <id>); 不固定的文章随机抽.
quotes:
  - id: baudelaire-nuages
    text: "« J'aime les nuages… les nuages qui passent… là-bas… là-bas… les merveilleux nuages ! »"
    trans: "I love the clouds… the clouds that pass… up there… up there… the marvelous clouds!"
    source: "Baudelaire, L'Étranger"
    link_label: "Who Am I?"
    lang: fr
  - id: distance-petal
    text: "Spring remembered every petal, but forgot who I was waiting for."
    source: "What Distance Taught Us, 2026"
    link_label: "read the poem"
    lang: en
  - id: distance-seasons
    text: "The seasons keep their faith — but we who swore to meet beneath each moon have let time break."
    source: "What Distance Taught Us, 2026"
    link_label: "read the poem"
    lang: en
  - id: whoami-kid
    text: "A kid wanted to be a scientist, but lost precious things on the road."
    source: "Who Am I?, 2025"
    link_label: "read the essay"
    lang: en
  - id: whoami-road
    text: "A kid wanted to be a scientist, and I hope the road still goes on."
    source: "Who Am I?, 2026"
    link_label: "read the essay"
    lang: en
