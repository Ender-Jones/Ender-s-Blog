# 按"中英分开创作"原则写: 不是翻译, 内容为传达同一目的而独立成文. 每段都是你的声音, 随意重写.
# Claude 初稿 2026-07-22, 口吻待印过.

lead: >-
  一个想当科学家的小孩,
  如今在教机器读懂身体的感受.

paras:
  - >-
    我在东京/千叶读博. 我的研究问一个很简单的问题: 机器能不能只靠看,
    就知道你有多紧张? 这个 blog 抓到的正是转向途中的我 — 从视频里读脉搏和皮肤电,
    转向去问那些大的视觉-语言模型: 你们能不能学会感受?
  - >-
    研究之前先有写作, 写作之前是一条走了很久的路 — 下面这篇 essay 讲的是开头,
    它的 2025 年前身收着更难的那几章. 我用三种语言写字, 主要用两种思考,
    而重要的东西都收在同一个地方: 这个 blog.

essay_link:
  label: 读《Who Am I?》— 更长的那个答案
  href: /posts/zh/who-am-i/

# 站点的三重身份(dotted rows)
notebook:
  - key: 研究日志
    value: 方法、指标、诚实的阴性结果
  - key: 个人档案
    value: 散文和诗, 收着不让忘掉
  - key: 证明
    value: 一天一行, 说明工作还在继续

# ADHD 方法论短节(将来独立成文, 这里只带过)
system:
  title: 一行字, 对抗遗忘
  body: >-
    写 worklog, 是因为我的工作记忆装不下完整的一天. 捕捉的时候只写一行,
    关日的时候有个小小的仪式, git 是整套系统的脊柱: done 比 todo 值钱,
    放弃一个任务是决策而不是失败, 空白的日子不欠任何人任何东西.
    关于这套系统会有一篇更长的文章; 在那之前, worklog 本身就是演示.
  link_label: 看它运转 →
  link: /worklog/

