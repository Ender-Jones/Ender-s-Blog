services:
  site:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "[ -x node_modules/.bin/astro ] || npm install; exec npm run dev -- --host 0.0.0.0"
    ports:
      - "4321:4321"
    environment:
      ASTRO_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - npm-cache:/root/.npm

volumes:
  node_modules:
  npm-cache:
